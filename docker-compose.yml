services:
  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
      target: dev
    volumes:
      - ./:/moneymate-backend
      - ./shared:/moneymate-backend/shared
    working_dir: /moneymate-backend/services/gateway
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/moneymate-backend/services/gateway/config/config.yaml
      - SERVER_PORT=8080
      - SERVICES_AUTH_ADDR=auth:8081
      - REDIS_ADDRESS=redis:6379
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - moneymate-network

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
      target: dev
    volumes:
      - ./:/moneymate-backend
      - ./shared:/moneymate-backend/shared
    working_dir: /moneymate-backend/services/auth
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/moneymate-backend/services/auth/config/config.yaml
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_ADDR=redis:6379
      - ENVIRONMENT=dev
    expose:
      - "8081"
    ports: ["8081:8081"]  
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moneymate-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/postgres/roles:/docker-entrypoint-initdb.d/roles
    networks:
      - moneymate-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - moneymate-network

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  moneymate-network:
    driver: bridge
