services:
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
      target: dev # <--- Uses the Air development stage
    volumes:
      - ./:/moneymate-backend

    working_dir: /moneymate-backend/gateway
    environment:
      - CONFIG_PATH=/moneymate-backend/shared/config/config.yaml
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  auth:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
      target: dev # <--- Uses the Air development stage
    volumes:
     - ./:/moneymate-backend
    working_dir: /moneymate-backend/auth
    environment:
      - CONFIG_PATH=/moneymate-backend/shared/config/config.yaml
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine # 16 is the current stable alpine version
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine # 7 is the current stable alpine version
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  postgres_data:
  redis_data:
